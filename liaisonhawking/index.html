<style>
:root{
  --navy:#00205B;--white:#fff;--bg:#f2ede8;--card:#fff;
  --border:#e2e8f0;--text1:#111;--text2:#444;--text3:#888;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --purple:#7c3aed;--purple-bg:#f3e8ff;
  --accent:#c4622d;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif;}
body{background:var(--bg);min-height:100vh;}

/* HEADER */
.header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.header-sub{font-size:11px;opacity:.7;margin-top:1px;}
.role-badge{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.15);font-weight:600;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:53px;z-index:99;overflow-x:auto;}
.tab-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;min-width:80px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* CARDS */
.section{padding:12px;}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px 6px;}
.card-row{display:flex;align-items:center;padding:10px 14px;border-top:1px solid var(--border);gap:10px;}
.card-row:first-of-type{border-top:none;}

/* LEAVE ITEMS */
.leave-item{display:flex;flex-direction:column;gap:2px;flex:1;}
.leave-name{font-size:14px;font-weight:600;color:var(--text1);}
.leave-meta{font-size:11px;color:var(--text3);}
.status-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0;}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-approved{background:var(--green-bg);color:var(--green);}
.badge-active{background:var(--purple-bg);color:var(--purple);}
.badge-returned{background:#f1f5f9;color:#64748b;}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.btn-approve{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.btn-reject{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.pin-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;}
.pin-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px;}
.pin-dots{display:flex;gap:12px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.2);transition:.15s;}
.pin-dot.filled{background:#fff;}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.pin-key{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.1);color:#fff;font-size:22px;font-weight:600;border:none;cursor:pointer;transition:.1s;}
.pin-key:active{background:rgba(255,255,255,.25);}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

/* REGISTER VIEW */
.reg-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border);}
.reg-name{flex:1;font-size:13px;font-weight:500;}
.reg-stat{font-size:11px;font-weight:600;width:28px;text-align:center;}
.stat-p{color:var(--green);}
.stat-a{color:var(--red);}
.stat-e{color:var(--amber);}
.stat-l{color:var(--purple);}
.stat-blank{color:#ddd;}

/* EMPTY STATE */
.empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;}
</style>
</head>

let _liaison_session_ms = 7*24*60*60*1000; // default 1 week

async function loadLiaisonPin(){
  try{
    const {data,error}=await _supaClient.from('boarding_settings')
      .select('key,value').in('key',['liaisonPin','liaisonSessionPolicy']);
    if(error)throw error;
    (data||[]).forEach(r=>{
      try{
        if(r.key==='liaisonPin'){
          let v=r.value;
          try{v=JSON.parse(v);}catch{}
          LIAISON_PIN=String(v).trim();
          console.log('Liaison PIN loaded, length='+LIAISON_PIN.length);
          updatePinDots();
        }
        if(r.key==='liaisonSessionPolicy'){
          try{_liaison_session_ms=sessionPolicyToMs(JSON.parse(r.value));}catch{}
        }
      }catch(e){console.warn('PIN parse:',e);}
    });
  }catch(e){console.warn('loadLiaisonPin failed:',e);}
}

function sessionPolicyToMs(policy){
  if(policy==='always') return 0;
  if(policy==='daily')  return 24*36e5;
  if(policy==='weekly') return 7*864e5;
  if(policy==='2weeks') return 14*864e5;
  if(policy==='inactivity_4')  return 4*36e5;
  if(policy==='inactivity_8')  return 8*36e5;
  if(policy==='inactivity_24') return 24*36e5;
  return 7*864e5;
}

// supa() helper — wraps SDK for backwards compatibility with existing code
async function supa(table){
  return {
    async get(params=''){
      // Parse simple query string params into SDK filters
      let q=_supaClient.from(table).select('*');
      // Handle common param patterns
      params.split('&').filter(Boolean).forEach(p=>{
        const [k,v]=p.split('=');
        if(!k||!v)return;
        if(k==='order'){const [col,dir]=v.split('.');q=q.order(col,{ascending:dir!=='desc'});}
        else if(k==='limit'){q=q.limit(parseInt(v));}
        else if(v.startsWith('eq.')){q=q.eq(k,v.slice(3));}
        else if(v.startsWith('gte.')){q=q.gte(k,v.slice(4));}
        else if(v.startsWith('in.')){const vals=v.slice(4,-1).split(',').map(s=>s.replace(/^['"]|['"]$/g,''));q=q.in(k,vals);}
        else if(v.startsWith('in.(')){const vals=v.slice(4,-1).split(',').map(s=>s.trim());q=q.in(k,vals);}
      });
      const {data,error}=await q;
      if(error){console.warn('supa get error:',error);return[];}
      return data||[];
    },
    async patch(id,body){
      const {error}=await _supaClient.from(table).update(body).eq('id',id);
      return !error;
    }
  };
}

// ── PIN ──────────────────────────────────────────────────────────────────────
let _pin='';
function pinKey(k){
  if(k==='back'){_pin=_pin.slice(0,-1);}
  else if(k==='ok'){checkPin();}
  else if(_pin.length<(LIAISON_PIN.length||6)){_pin+=k;}
  updatePinDots();
  if(LIAISON_PIN&&_pin.length===LIAISON_PIN.length)setTimeout(checkPin,100);
}
function updatePinDots(){
  const total=LIAISON_PIN.length||6;
  for(let i=0;i<6;i++){
    const dot=document.getElementById('d'+i);
    if(!dot)return;
    dot.style.display=i<total?'block':'none';
    dot.className='pin-dot'+(_pin.length>i?' filled':'');
  }
}
function checkPin(){
  // Normalise both to trimmed strings for safe comparison
  const entered = String(_pin).trim();
  const stored  = String(LIAISON_PIN).trim();
  console.log('checkPin: entered='+JSON.stringify(entered)+' stored='+JSON.stringify(stored)+' match='+(entered===stored));
  if(entered && stored && entered===stored){
    try{ localStorage.setItem('liaison_auth_ts', Date.now().toString()); }catch{}
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else if(!stored){
    // PIN not yet loaded — wait and retry
    document.getElementById('pin-error').textContent='Loading PIN, please try again…';
    _pin=''; updatePinDots();
    setTimeout(()=>document.getElementById('pin-error').textContent='',2000);
  } else {
    document.getElementById('pin-error').textContent='Incorrect PIN';
    _pin=''; updatePinDots();
    setTimeout(()=>document.getElementById('pin-error').textContent='',1500);
  }
}

function checkSessionValid(){
  if(_liaison_session_ms===0) return false; // always ask
  try{
    const ts=parseInt(localStorage.getItem('liaison_auth_ts')||'0');
    return Date.now()-ts < _liaison_session_ms;
  }catch{return false;}
}

  if(name==='register')loadRegister();

}

// ── LEAVES ───────────────────────────────────────────────────────────────────
async function submitLeave(){
  const name=document.getElementById('lv-name')?.value?.trim();
  const type=document.getElementById('lv-type')?.value;
  const start=document.getElementById('lv-start')?.value;
  const end=document.getElementById('lv-end')?.value;
  const notes=document.getElementById('lv-notes')?.value?.trim();
  if(!name||!type||!start){alert('Please fill in student name, type and start date.');return;}
  const btn=document.getElementById('lv-submit');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    const db=await supa('boarding_leaves');
    await db.patch ? null : null; // ensure client ready
    const res=await fetch(`${SUPA_URL}/rest/v1/boarding_leaves`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SUPA_KEY}`,'apikey':SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({student_name:name,leave_type:type,start_date:start,end_date:end||null,notes:notes||null,status:'pending',active:true,created_by:'Liaison'})
    });
    if(!res.ok)throw new Error('Save failed: '+res.status);
    document.getElementById('lv-name').value='';
    document.getElementById('lv-notes').value='';
    showLiaisonToast('✓ Leave request submitted');
    loadLeaves();
  }catch(e){alert('Error: '+e.message);}
  finally{btn.disabled=false;btn.textContent='Submit Request';}
}

function showLiaisonToast(msg,color='#16a34a'){
  let t=document.getElementById('liaison-toast');
  if(!t){t=document.createElement('div');t.id='liaison-toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.background=color;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2500);
}

async function loadLeaves(){
  const el=document.getElementById('tab-leaves');
  // Add leave form at top
  const today_=new Date().toISOString().split('T')[0];
  const addForm=`<div class="card" style="margin-bottom:12px">
    <div class="card-title">➕ New Leave Request</div>
    <div style="display:flex;flex-direction:column;gap:8px;padding:4px 0">
      <input id="lv-name" placeholder="Student name" style="padding:8px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px;width:100%">
      <select id="lv-type" style="padding:8px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px;width:100%">
        <option value="">— Leave type —</option>
        <option value="weekend">🏠 Weekend Leave</option>
        <option value="medical">🏥 Medical</option>
        <option value="family">👨‍👩‍👧 Family</option>
        <option value="activity">⚽ School Activity</option>
        <option value="longterm">📅 Long-term</option>
      </select>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label style="font-size:10px;color:#888">FROM</label>
          <input id="lv-start" type="date" value="${today_}" style="padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px;width:100%"></div>
        <div style="flex:1"><label style="font-size:10px;color:#888">TO (optional)</label>
          <input id="lv-end" type="date" style="padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px;width:100%"></div>
      </div>
      <input id="lv-notes" placeholder="Notes (optional)" style="padding:8px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px;width:100%">
      <button id="lv-submit" onclick="submitLeave()" style="background:#00205B;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">Submit Request</button>
    </div>
  </div>`;
  el.innerHTML=addForm+'<div class="loading">Loading leaves…</div>';
  const data=await(await supa('boarding_leaves')).get('order=created_at.desc&limit=50');
  const listEl=el.querySelector('.loading');
  if(!data.length){if(listEl)listEl.outerHTML='<div class="empty">No leave requests yet.</div>';return;}

  const grouped={pending:[],approved:[],active:[],returned:[]};
  data.forEach(l=>{(grouped[l.status]||grouped.returned).push(l);});

  const statusLabel={pending:'Pending Approval',approved:'Approved — Not Departed',active:'Currently Away',returned:'Returned'};
  const statusCls={pending:'badge-pending',approved:'badge-approved',active:'badge-active',returned:'badge-returned'};
  const icons={pending:'⏳',approved:'✅',active:'🚗',returned:'🏠'};

  let html='';
  ['pending','approved','active','returned'].forEach(status=>{
    const items=grouped[status];
    if(!items.length)return;
    html+=`<div class="card">
      <div class="card-title">${icons[status]} ${statusLabel[status]} (${items.length})</div>`;
    items.forEach(l=>{
      const typeEmoji={weekend:'🏠',medical:'🏥',family:'👨‍👩‍👧',activity:'⚽',longterm:'📅'}[l.leave_type]||'📋';
      html+=`<div class="card-row">
        <div class="leave-item">
          <div class="leave-name">${l.student_name}</div>
          <div class="leave-meta">${typeEmoji} ${l.leave_type||'leave'} &nbsp;·&nbsp; ${l.start_date}${l.end_date?' → '+l.end_date:''}</div>
          ${l.notes?`<div class="leave-meta" style="color:#aaa;font-style:italic">${l.notes}</div>`:''}
        </div>
        <span class="status-badge ${statusCls[status]}">${status}</span>
      </div>`;
    });
    html+='</div>';
  });
  // Replace loading with list, preserving the form
  const formEl=document.getElementById('lv-submit')?.closest('.card');
  if(formEl){
    // Remove old list if any
    const oldList=el.querySelector('.leaves-list');
    if(oldList)oldList.remove();
    const listDiv=document.createElement('div');
    listDiv.className='leaves-list';
    listDiv.innerHTML=html;
    el.appendChild(listDiv);
  } else {
    el.innerHTML=html;
  }
}

// ── REGISTER ─────────────────────────────────────────────────────────────────
async function loadRegister(){
  const el=document.getElementById('tab-register');
  el.innerHTML='<div class="loading">Loading register...</div>';
  const td=today();
  const data=await(await supa('boarding_registrations')).get(`register_date=eq.${td}&order=student_name`);

  const sessions={morning:[],prep:[],hoob:[]};
  const allNames=new Set();
  const byName={};
  data.forEach(r=>{
    allNames.add(r.student_name);
    if(!byName[r.student_name])byName[r.student_name]={};
    byName[r.student_name][r.session_type]={status:r.status,updated_at:r.updated_at};
  });

  const sessionLabel={morning:'🌅 Morning Clearance',prep:'📚 Evening Prep',hoob:'🌙 Heads on Beds'};
  let html='<div class="card"><div class="card-title" style="padding-bottom:8px">Today — '+new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})+'</div>';

  if(!allNames.size){html+='<div class="empty">No registrations today.</div></div>';el.innerHTML=html;return;}

  ['morning','prep','hoob'].forEach(sess=>{
    html+=`<div class="card-title" style="background:#f8fafc;padding:6px 14px;font-size:10px">${sessionLabel[sess]}</div>`;
    [...allNames].sort().forEach(name=>{
      const st=((byName[name]||{})[sess]||{}).status||'';
      const cls=st==='present'?'stat-p':st==='absent'?'stat-a':st==='excused'?'stat-e':st==='l'?'stat-l':'stat-blank';
      const sym=st==='present'?'✓':st==='absent'?'✗':st==='excused'?'~':st==='l'?'L':'·';
      const reg=byName[name]?.[sess];
      // Show last updated time (not staff name)
      const updTime=reg?.updated_at?new Date(reg.updated_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
      html+=`<div class="reg-item">
        <span class="reg-name">${name}</span>
        <span style="flex:1;font-size:10px;color:#bbb;text-align:right;padding-right:6px">${updTime}</span>
        <span class="reg-stat ${cls}">${sym}</span>
      </div>`;
    });
  });
  html+='</div>';
  el.innerHTML=html;
}

// ── MESSAGE GENERATOR ────────────────────────────────────────────

let _gmText='';
let _liaisonStudents=[];

async function renderMessageTab(){

  if(!_liaisonStudents.length){
    try{
      const db=await supa('work_app_data');

  const now=new Date();

  const timeVal=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const opts=_liaisonStudents.map(n=>`<option value="${n}">`).join('');
  const el=document.getElementById('tab-message');
  el.innerHTML=`<div class="card">
    <div class="card-title">📨 Gate Pass Message</div>
    <div style="display:flex;flex-direction:column;gap:10px;padding:4px 0">
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">STUDENT</label>
        <input id="lv-gm-student" list="lv-gm-list" placeholder="Type name…" oninput="updateLiaisonMsg()"
          style="width:100%;padding:8px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:14px">
        <datalist id="lv-gm-list">${opts}</datalist>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">DATE</label>
          <input id="lv-gm-date" type="date" value="${dateVal}" oninput="updateLiaisonMsg()"
            style="width:100%;padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
        </div>
        <div style="flex:1">
          <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">TIME</label>
          <input id="lv-gm-time" type="time" value="${timeVal}" oninput="updateLiaisonMsg()"
            style="width:100%;padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
        </div>
      </div>
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:5px">REASON</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="lv-gm-reasons">
          ${[['parents','👨‍👩‍👧 Parents','家长接送'],['relative','👤 Relative','亲属接送'],['didi','🚗 Didi/Taxi','滴滴/出租车'],['activity','🏃 Activity','学校活动']].map(([v,l,s])=>`
            <button onclick="selectLiaisonReason('${v}')" id="lv-r-${v}"
              style="background:${v==='parents'?'#00205B':'#f8fafc'};border:1px solid ${v==='parents'?'#00205B':'#e5e7eb'};border-radius:8px;color:${v==='parents'?'#fff':'#333'};padding:8px 10px;cursor:pointer;text-align:left">
              <div style="font-size:13px;font-weight:600">${l}</div>
              <div style="font-size:10px;opacity:.7">${s}</div>
            </button>`).join('')}
        </div>
      </div>
      <div id="lv-gm-extra"></div>
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:4px">MESSAGE PREVIEW</label>
        <div id="lv-gm-preview" style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:80px;color:#333"></div>
      </div>
      <button onclick="copyLiaisonMsg()"
        style="background:#00205B;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">
        📋 Copy Message
      </button>
    </div>
  </div>`;
  _gmReason='parents';
  updateLiaisonMsg();
}

function selectLiaisonReason(r){
  _gmReason=r;
  document.querySelectorAll('#lv-gm-reasons button').forEach(b=>{
    const on=b.id==='lv-r-'+r;
    b.style.background=on?'#00205B':'#f8fafc';
    b.style.borderColor=on?'#00205B':'#e5e7eb';
    b.style.color=on?'#fff':'#333';
  });
  // Extra fields
  const ex=document.getElementById('lv-gm-extra');
  if(r==='relative'){
    ex.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">
      <input id="lv-gm-rel" placeholder="Relative name (optional)" oninput="updateLiaisonMsg()"
        style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
      <input id="lv-gm-relid" placeholder="ID number (optional)" oninput="updateLiaisonMsg()"
        style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
    </div>`;
  } else if(r==='didi'){
    ex.innerHTML=`<input id="lv-gm-plate" placeholder="Plate number e.g. 苏EK1234 (optional)" oninput="updateLiaisonMsg()"
      style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:14px;letter-spacing:2px">`;
  } else { ex.innerHTML=''; }
  updateLiaisonMsg();
}

function updateLiaisonMsg(){
  const name=(document.getElementById('lv-gm-student')?.value||'').trim();
  const date=document.getElementById('lv-gm-date')?.value||'';
  const time=document.getElementById('lv-gm-time')?.value||'';
  const r=_gmReason;
  let dateLabel=date,dateLabelZh=date;
  try{
    const d=new Date(date+'T12:00:00');
    const days=['周日','周一','周二','周三','周四','周五','周六'];
    const dEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    dateLabel=dEn[d.getDay()]+' '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    dateLabelZh=days[d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日';
  }catch{}
  const rzh={parents:'家长接送',relative:'亲属接送（需查验证件）',didi:'滴滴/出租车接送',activity:'学校活动外出'}[r]||'家长接送';
  const ren={parents:'Parents picking up',relative:'Relative pick-up (ID required)',didi:'Didi / Taxi pick-up',activity:'School activity'}[r]||'Parents picking up';
  let exZh='',exEn='';
  if(r==='relative'){
    const rn=document.getElementById('lv-gm-rel')?.value?.trim()||'';
    const ri=document.getElementById('lv-gm-relid')?.value?.trim()||'';
    if(rn){exZh+='
亲属姓名：'+rn;exEn+='
Relative: '+rn;}
    if(ri){exZh+='
证件号码：'+ri;exEn+='
ID: '+ri;}
  } else if(r==='didi'){
    const pl=document.getElementById('lv-gm-plate')?.value?.trim()||'';
    if(pl){exZh+='
车牌号：'+pl;exEn+='
Plate: '+pl;}
  }
  const zh=`【霍金宿舍 Hawking House】
${dateLabelZh} ${time}

学生：${name||'___'}
离开原因：${rzh}${exZh}

请允许该学生出门，谢谢 ✅`;
  const en=`Hawking House | ${dateLabel} ${time}
Student: ${name||'___'}
Reason: ${ren}${exEn}
Please allow student through the gate ✅`;
  _gmText=zh+'

'+en;
  const pr=document.getElementById('lv-gm-preview');
  if(pr)pr.textContent=_gmText;
}

async function copyLiaisonMsg(){
  if(!_gmText)return;
  try{
    await navigator.clipboard.writeText(_gmText);
    showLiaisonToast('✓ Copied to clipboard');
  }catch{
    const ta=document.createElement('textarea');
    ta.value=_gmText;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    showLiaisonToast('✓ Copied');
  }
}

// ── MEDICAL ──────────────────────────────────────────────────────────────────
async function loadMedical(){
  const el=document.getElementById('tab-medical');
  el.innerHTML='<div class="loading">Loading...</div>';
  const from=new Date();from.setDate(from.getDate()-7);
  const fromISO=from.toISOString().split('T')[0];
  const data=await(await supa('boarding_medical')).get(`visit_date=gte.${fromISO}&order=visit_time.desc`);
  if(!data.length){el.innerHTML='<div class="empty">No nurse visits in the last 7 days.</div>';return;}
  let html='<div class="card"><div class="card-title">Nurse Visits — Last 7 Days</div>';
  data.forEach(v=>{
    const t=v.visit_time?new Date(v.visit_time).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
    html+=`<div class="card-row">
      <div style="flex:1">
        <div class="leave-name">${v.student_name}</div>
        <div class="leave-meta">${t}${v.session_type?' · '+v.session_type:''}</div>
        ${v.notes?`<div class="leave-meta" style="font-style:italic;color:#aaa">${v.notes}</div>`:''}
      </div>
      <div style="font-size:10px;color:#888">${v.logged_by||''}</div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => console.log('Liaison SW registered'))
      .catch(e => console.warn('SW failed:', e));
  });
}
</script>
