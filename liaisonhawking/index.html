<html lang="en">
<head>

<style>
:root{
  --navy:#00205B;--white:#fff;--bg:#f2ede8;--card:#fff;
  --border:#e2e8f0;--text1:#111;--text2:#444;--text3:#888;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --purple:#7c3aed;--purple-bg:#f3e8ff;
  --accent:#c4622d;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'DM Sans',Arial,sans-serif;}
body{background:var(--bg);min-height:100vh;}

/* HEADER */
.header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;}
.header-sub{font-size:11px;opacity:.7;margin-top:1px;}
.role-badge{font-size:11px;padding:3px 10px;border-radius:12px;background:rgba(255,255,255,.15);font-weight:600;}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:53px;z-index:99;overflow-x:auto;}
.tab-btn{flex:1;padding:11px 8px;font-size:12px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;min-width:80px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

/* CARDS */
.section{padding:12px;}
.card{background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.card-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 14px 6px;}
.card-row{display:flex;align-items:center;padding:10px 14px;border-top:1px solid var(--border);gap:10px;}
.card-row:first-of-type{border-top:none;}

/* LEAVE ITEMS */
.leave-item{display:flex;flex-direction:column;gap:2px;flex:1;}
.leave-name{font-size:14px;font-weight:600;color:var(--text1);}
.leave-meta{font-size:11px;color:var(--text3);}
.status-badge{font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;flex-shrink:0;}
.badge-pending{background:var(--amber-bg);color:var(--amber);}
.badge-approved{background:var(--green-bg);color:var(--green);}
.badge-active{background:var(--purple-bg);color:var(--purple);}
.badge-returned{background:#f1f5f9;color:#64748b;}

/* BUTTONS */
.btn{padding:6px 14px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.btn-approve{background:var(--green-bg);color:var(--green);border:1px solid var(--green);}
.btn-reject{background:var(--red-bg);color:var(--red);border:1px solid var(--red);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* PIN */
.pin-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.pin-title{color:#fff;font-size:20px;font-weight:700;margin-bottom:8px;}
.pin-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px;}
.pin-dots{display:flex;gap:12px;margin-bottom:32px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.2);transition:.15s;}
.pin-dot.filled{background:#fff;}
.pin-grid{display:grid;grid-template-columns:repeat(3,72px);gap:10px;}
.pin-key{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.1);color:#fff;font-size:22px;font-weight:600;border:none;cursor:pointer;transition:.1s;}
.pin-key:active{background:rgba(255,255,255,.25);}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--text3);font-size:13px;}

/* FIRE REGISTER */
#l-fire-overlay{display:none;position:fixed;inset:0;background:#111;z-index:9999;flex-direction:column;overflow:hidden;}
#l-fire-overlay.open{display:flex;}
.l-fire-hdr{background:#dc2626;padding:12px 16px;flex-shrink:0;}
.l-fire-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.l-fire-hdr-title{color:#fff;font-size:18px;font-weight:900;letter-spacing:.05em;}
.l-fire-hdr-count{color:#fff;font-size:14px;font-weight:700;background:rgba(0,0,0,.3);padding:4px 10px;border-radius:8px;}
.l-fire-controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.l-fire-seg{display:flex;background:rgba(0,0,0,.3);border-radius:8px;overflow:hidden;}
.l-fire-seg-btn{background:none;border:none;color:rgba(255,255,255,.6);padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;}
.l-fire-seg-btn.active{background:rgba(255,255,255,.25);color:#fff;}
.l-fire-list{flex:1;overflow-y:auto;padding:8px;}
.l-fire-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#222;border-radius:8px;margin-bottom:4px;cursor:pointer;margin-top:8px;}
.l-fire-sec-title{color:#fff;font-size:13px;font-weight:700;}
.l-fire-sec-count{color:#aaa;font-size:11px;}
.l-fire-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1a1a1a;border-radius:7px;margin-bottom:3px;}
.l-fire-row.present{background:#14532d22;}
.l-fire-row.absent{background:#7f1d1d22;}
.l-fire-name{flex:1;color:#fff;font-size:14px;font-weight:500;}
.l-fire-btns{display:flex;gap:4px;}
.l-fire-btn{width:36px;height:36px;border-radius:8px;border:1px solid #333;background:#222;color:#888;font-size:14px;font-weight:700;cursor:pointer;}
.l-fire-btn.active-present{background:#16a34a;border-color:#16a34a;color:#fff;}
.l-fire-btn.active-absent{background:#dc2626;border-color:#dc2626;color:#fff;}
.l-fire-btn.active-excused{background:#d97706;border-color:#d97706;color:#fff;}
.l-fire-footer{background:#1a1a1a;padding:12px 16px;display:flex;gap:8px;flex-shrink:0;}
.l-fire-cancel-btn{flex:1;padding:12px;border-radius:10px;border:1px solid #333;background:none;color:#888;font-size:14px;font-weight:700;cursor:pointer;}
.l-fire-submit-btn{flex:2;padding:12px;border-radius:10px;border:none;background:#22c55e;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}

/* REGISTER VIEW */
.reg-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-top:1px solid var(--border);}
.reg-name{flex:1;font-size:13px;font-weight:500;}
.reg-stat{font-size:11px;font-weight:600;width:28px;text-align:center;}
.stat-p{color:var(--green);}
.stat-a{color:var(--red);}
.stat-e{color:var(--amber);}
.stat-l{color:var(--purple);}
.stat-blank{color:#ddd;}

/* EMPTY STATE */
.empty{padding:32px 16px;text-align:center;color:var(--text3);font-size:13px;}
</style>

<script>
const SUPA_URL='https://mkvfggacecgltscdrfqv.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rdmZnZ2FjZWNnbHRzY2RyZnF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MjM3MDcsImV4cCI6MjA5NDQ5OTcwN30.ErSZCR9G1NlBiq5ScOL3pmhPzJd5aYk92BU1I7Rzsr4';
const _supaClient = supabase.createClient(SUPA_URL, SUPA_KEY);
let LIAISON_PIN=''; // Loaded from Supabase
let _liaison_session_ms = 7*24*60*60*1000; // default 1 week

async function loadLiaisonPin(){
  try{
    const {data,error}=await _supaClient.from('boarding_settings')
      .select('key,value').in('key',['liaisonPin','liaisonSessionPolicy']);
    if(error)throw error;
    (data||[]).forEach(r=>{
      try{
        if(r.key==='liaisonPin'){
          let v=r.value;
          try{v=JSON.parse(v);}catch{}
          LIAISON_PIN=String(v).trim();
          console.log('Liaison PIN loaded, length='+LIAISON_PIN.length);
          updatePinDots();
        }
        if(r.key==='liaisonSessionPolicy'){
          try{_liaison_session_ms=sessionPolicyToMs(JSON.parse(r.value));}catch{}
        }
      }catch(e){console.warn('PIN parse:',e);}
    });
  }catch(e){console.warn('loadLiaisonPin failed:',e);}
}

function sessionPolicyToMs(policy){
  if(policy==='always') return 0;
  if(policy==='daily')  return 24*36e5;
  if(policy==='weekly') return 7*864e5;
  if(policy==='2weeks') return 14*864e5;
  if(policy==='inactivity_4')  return 4*36e5;
  if(policy==='inactivity_8')  return 8*36e5;
  if(policy==='inactivity_24') return 24*36e5;
  return 7*864e5;
}

// supa() helper — wraps SDK for backwards compatibility with existing code
async function supa(table){
  return {
    async get(params=''){
      // Parse simple query string params into SDK filters
      let q=_supaClient.from(table).select('*');
      // Handle common param patterns
      params.split('&').filter(Boolean).forEach(p=>{
        const [k,v]=p.split('=');
        if(!k||!v)return;
        if(k==='order'){const [col,dir]=v.split('.');q=q.order(col,{ascending:dir!=='desc'});}
        else if(k==='limit'){q=q.limit(parseInt(v));}
        else if(v.startsWith('eq.')){q=q.eq(k,v.slice(3));}
        else if(v.startsWith('gte.')){q=q.gte(k,v.slice(4));}
        else if(v.startsWith('in.')){const vals=v.slice(4,-1).split(',').map(s=>s.replace(/^['"]|['"]$/g,''));q=q.in(k,vals);}
        else if(v.startsWith('in.(')){const vals=v.slice(4,-1).split(',').map(s=>s.trim());q=q.in(k,vals);}
      });
      const {data,error}=await q;
      if(error){console.warn('supa get error:',error);return[];}
      return data||[];
    },
    async patch(id,body){
      const {error}=await _supaClient.from(table).update(body).eq('id',id);
      return !error;
    }
  };
}

// ── PIN ──────────────────────────────────────────────────────────────────────
async function clearCacheReload(){
  try{
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r=>r.unregister()));
    const keys = await caches.keys();
    await Promise.all(keys.map(k=>caches.delete(k)));
    console.log('Cache cleared');
  }catch(e){console.warn(e);}
  window.location.reload(true);
}

let _pin='';
function pinKey(k){
  if(k==='back'){_pin=_pin.slice(0,-1);}
  else if(k==='ok'){checkPin();}
  else if(_pin.length<(LIAISON_PIN.length||6)){_pin+=k;}
  updatePinDots();
  if(LIAISON_PIN&&_pin.length===LIAISON_PIN.length)setTimeout(checkPin,100);
}
function updatePinDots(){
  const total=LIAISON_PIN.length||6;
  for(let i=0;i<6;i++){
    const dot=document.getElementById('d'+i);
    if(!dot)return;
    dot.style.display=i<total?'block':'none';
    dot.className='pin-dot'+(_pin.length>i?' filled':'');
  }
}
function checkPin(){
  // Normalise both to trimmed strings for safe comparison
  const entered = String(_pin).trim();
  const stored  = String(LIAISON_PIN).trim();
  console.log('checkPin: entered='+JSON.stringify(entered)+' stored='+JSON.stringify(stored)+' match='+(entered===stored));
  if(entered && stored && entered===stored){
    try{ localStorage.setItem('liaison_auth_ts', Date.now().toString()); }catch{}
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  } else if(!stored){
    // PIN not yet loaded — wait and retry
    document.getElementById('pin-error').textContent='Loading PIN, please try again…';
    _pin=''; updatePinDots();
    setTimeout(()=>document.getElementById('pin-error').textContent='',2000);
  } else {
    document.getElementById('pin-error').textContent='Incorrect PIN';
    _pin=''; updatePinDots();
    setTimeout(()=>document.getElementById('pin-error').textContent='',1500);
  }
}

function checkSessionValid(){
  if(_liaison_session_ms===0) return false; // always ask
  try{
    const ts=parseInt(localStorage.getItem('liaison_auth_ts')||'0');
    return Date.now()-ts < _liaison_session_ms;
  }catch{return false;}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function today(){return new Date().toISOString().split('T')[0];}
// Load PIN from Supabase, then check session
window.addEventListener('DOMContentLoaded', async ()=>{
  await loadLiaisonPin();
  updatePinDots();
  if(checkSessionValid()){
    document.getElementById('pin-screen').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }
});

let _lDefaultTab = 'leaves';

function setLiaisonDefaultTab(){
  try{localStorage.setItem('liaison_default_tab',_lCurrentTab);}catch{}
  const btn=document.getElementById('l-star-btn');
  if(btn){btn.textContent='★';btn.style.color='#fbbf24';}
  showLiaisonToast('★ Default tab set: '+_lCurrentTab);
  setTimeout(()=>{if(btn){btn.textContent='☆';btn.style.color='#fff';}},1500);
}

function showLiaisonFireScreen(){ openLFireRegister(); }

// ── LIAISON FIRE REGISTER ──────────────────────────────────────
let _lFireState={}, _lFireScope='boarders', _lFireGroup='grade', _lFireSections={};

function openLFireRegister(){
  _lFireState={};_lFireSections={};
  document.getElementById('l-fire-overlay').classList.add('open');
  renderLFireRegister();
}
function lCloseFireRegister(){ document.getElementById('l-fire-overlay').classList.remove('open'); }
function lSubmitFireRegister(){
  lCloseFireRegister();
  showLiaisonToast('🔥 Fire register submitted','#22c55e');
}
function lSetFireScope(scope,btn){
  _lFireScope=scope;
  document.querySelectorAll('#l-fire-scope-seg .l-fire-seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const gs=document.getElementById('l-fire-group-seg');
  if(gs)gs.style.display=scope==='boarders'?'flex':'none';
  renderLFireRegister();
}
function lSetFireGroup(g,btn){
  _lFireGroup=g;
  document.querySelectorAll('#l-fire-group-seg .l-fire-seg-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLFireRegister();
}
function lFireTap(name,status){
  const cur=(_lFireState[name]||{}).status;
  _lFireState[name]={status:cur===status?'':status};
  const row=document.querySelector(`[data-lfire="${CSS.escape(name)}"]`);
  if(row){
    const st=(_lFireState[name]||{}).status||'';
    row.className='l-fire-row'+(st?' '+st:'');
    row.querySelectorAll('[data-lfire-opt]').forEach(b=>{
      const opt=b.getAttribute('data-lfire-opt');
      b.className='l-fire-btn'+(opt===st?' active-'+opt:'');
    });
    // Update count
    const allRows=document.querySelectorAll('[data-lfire]');
    const done=[...allRows].filter(r=>(_lFireState[r.getAttribute('data-lfire')]||{}).status).length;
    const present=[...allRows].filter(r=>(_lFireState[r.getAttribute('data-lfire')]||{}).status==='present').length;
    const el=document.getElementById('l-fire-count');
    if(el)el.textContent=`${done}/${allRows.length} · ${present}✓`;
  }
}
function renderLFireRegister(){
  const list=document.getElementById('l-fire-list');
  if(!list)return;
  const boarderStatus=_lBoarderStatus||{};
  const allStudents=_liaisonStudents; // array of names
  const isBoarder=n=>{
    const v=boarderStatus[n];
    if(!v)return false;
    if(v===true)return true;
    if(typeof v==='object')return v.boarder===true||v===true;
    return false;
  };
  const visible=_lFireScope==='boarders'?allStudents.filter(isBoarder):allStudents;
  if(!visible.length){
    list.innerHTML='<div style="padding:2rem;text-align:center;color:#666;font-size:13px">No students loaded.<br><span style="font-size:11px;opacity:.6">Boarder count: '+Object.keys(boarderStatus).length+'</span></div>';
    return;
  }
  // Group by grade (from _lStudentGrades) or room (from _lBoarderRooms)
  let groups={};
  if(_lFireScope==='boarders'&&_lFireGroup==='room'&&_lBoarderRooms.length){
    _lBoarderRooms.forEach(room=>{
      const members=(room.boarders||[]).filter(n=>visible.includes(n));
      if(members.length) groups[room.name||room.id]=members;
    });
    const assigned=new Set(_lBoarderRooms.flatMap(r=>r.boarders||[]));
    const unassigned=visible.filter(n=>!assigned.has(n));
    if(unassigned.length) groups['No Room']=unassigned;
  } else if(_lFireGroup==='grade'||_lFireScope==='all'){
    // Group by grade using _lStudentData
    visible.forEach(n=>{
      const s=_lStudentData.find(x=>x.name===n);
      const tutor=s?.tutor||'';
      const grade=_lTutorGrades[tutor]||'Other';
      if(!groups[grade])groups[grade]=[];
      groups[grade].push(n);
    });
    if(!Object.keys(groups).length) groups['All']=visible;
  } else {
    groups={[_lFireScope==='boarders'?'All Boarders':'All House']:visible};
  }
  let html='';
  const total=visible.length;
  const done=visible.filter(s=>(_lFireState[s.name]||{}).status).length;
  const present=visible.filter(s=>(_lFireState[s.name]||{}).status==='present').length;
  document.getElementById('l-fire-count').textContent=`${done}/${total} · ${present}✓`;
  Object.entries(groups).forEach(([grp,names])=>{
    const grpDone=names.filter(n=>(_lFireState[n]||{}).status).length;
    html+=`<div class="l-fire-sec-hdr"><span class="l-fire-sec-title">${grp}</span><span class="l-fire-sec-count">${grpDone}/${names.length}</span></div>`;
    names.forEach(name=>{
      const safe=name.replace(/"/g,'&quot;');
      const st=(_lFireState[name]||{}).status||'';
      html+=`<div class="l-fire-row${st?' '+st:''}" data-lfire="${safe}">
        <span class="l-fire-name">${name}</span>
        <div class="l-fire-btns">
          <button class="l-fire-btn${st==='present'?' active-present':''}" data-lfire-opt="present" onclick="lFireTap('${safe}','present')">✓</button>
          <button class="l-fire-btn${st==='absent'?' active-absent':''}" data-lfire-opt="absent" onclick="lFireTap('${safe}','absent')">✗</button>
          <button class="l-fire-btn${st==='excused'?' active-excused':''}" data-lfire-opt="excused" onclick="lFireTap('${safe}','excused')">~</button>
        </div>
      </div>`;
    });
  });
  list.innerHTML=html;
}

// ── HOLIDAY DEPARTURE SYSTEM ─────────────────────────────────────────────────
let _cachedHolidays = null;

async function loadHolidaysFromSupa(_supaClient) {
  if (_cachedHolidays) return _cachedHolidays;
  try {
    const { data } = await _supaClient.from('work_app_data')
      .select('value').eq('key', 'holidaysData').maybeSingle();
    if (data) {
      let v = data.value;
      try { v = JSON.parse(v); } catch {}
      if (Array.isArray(v)) { _cachedHolidays = v; return v; }
    }
  } catch(e) { console.warn('Holiday load:', e); }
  return [];
}

function getUpcomingHoliday(holidays) {
  // Find any holiday starting within 7 days
  const now = new Date(); now.setHours(0,0,0,0);
  const soon = new Date(now); soon.setDate(soon.getDate() + 7);
  return holidays.find(h => {
    const start = new Date(h.start + 'T00:00:00');
    return start >= now && start <= soon;
  }) || holidays.find(h => {
    // Also check ongoing holidays (started but not ended)
    const start = new Date(h.start + 'T00:00:00');
    const end = new Date(h.end + 'T00:00:00');
    return start <= now && end >= now;
  }) || null;
}

async function confirmHolidayDeparture(studentName, holiday, _supaClient, role) {
  const now = new Date().toISOString();
  try {
    // Check if leave already exists for this holiday
    const { data: existing } = await _supaClient.from('boarding_leaves')
      .select('id').eq('student_name', studentName)
      .gte('departure_planned', holiday.start + 'T00:00:00')
      .lte('departure_planned', holiday.start + 'T23:59:59');
    
    if (existing && existing.length) {
      // Update existing leave with departure
      await _supaClient.from('boarding_leaves')
        .update({ departed_at: now })
        .eq('id', existing[0].id);
    } else {
      // Create new holiday leave + mark departed
      await _supaClient.from('boarding_leaves').insert({
        student_name: studentName,
        leave_type: 'holiday',
        departure_planned: holiday.start + 'T00:00:00',
        return_planned: holiday.end + 'T23:59:59',
        reason: holiday.name,
        active: true,
        created_by: role || 'System',
        departed_at: now,
        form_submitted: false,
        parents_called: false,
      });
    }
    return true;
  } catch(e) {
    console.error('Holiday departure error:', e);
    return false;
  }
}

async function confirmHolidayReturn(studentName, holiday, _supaClient) {
  const now = new Date().toISOString();
  try {
    const { data: existing } = await _supaClient.from('boarding_leaves')
      .select('id').eq('student_name', studentName)
      .gte('departure_planned', holiday.start + 'T00:00:00');
    if (existing && existing.length) {
      await _supaClient.from('boarding_leaves')
        .update({ returned_at: now })
        .eq('id', existing[0].id);
      return true;
    }
    return false;
  } catch(e) { return false; }
}

async function toggleLeaveChecklist(leaveId, field, value, _supaClient) {
  // field: 'form_submitted' | 'parents_called'
  try {
    await _supaClient.from('boarding_leaves').update({ [field]: value }).eq('id', leaveId);
    return true;
  } catch(e) { return false; }
}

// ── LEAVE CALENDAR ───────────────────────────────────────────────────────────
let _calYear = new Date().getFullYear();
let _calMonth = new Date().getMonth(); // 0-based
let _calScope = 'boarders'; // 'boarders' | 'all'
let _calLeaves = [];
let _calStudents = [];
let _calBoarderStatus = {};
let _calSelectedDay = null;

async function initLeaveCalendar(containerId, students, boarderStatus, supaRef) {
  _calStudents = students || [];
  _calBoarderStatus = boarderStatus || {};
  _calYear = new Date().getFullYear();
  _calMonth = new Date().getMonth();
  _calSelectedDay = null;
  await loadCalendarLeaves(supaRef);
  renderCalendar(containerId, supaRef);
}

async function loadCalendarLeaves(supaRef) {
  try {
    // Load 3 months around current
    const from = new Date(_calYear, _calMonth - 1, 1).toISOString().split('T')[0];
    const to   = new Date(_calYear, _calMonth + 2, 0).toISOString().split('T')[0];
    const { data } = await supaRef.from('boarding_leaves')
      .select('id,student_name,leave_type,departure_planned,return_planned,departed_at,returned_at,active')
      .gte('departure_planned', from + 'T00:00:00')
      .lte('departure_planned', to + 'T23:59:59');
    _calLeaves = data || [];
  } catch(e) { console.warn('Calendar load:', e); }
}

function renderCalendar(containerId, supaRef) {
  const el = document.getElementById(containerId);
  if (!el) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const todayISO = today.toISOString().split('T')[0];
  const monthStart = new Date(_calYear, _calMonth, 1);
  const monthEnd   = new Date(_calYear, _calMonth + 1, 0);
  const firstDay   = (monthStart.getDay() + 6) % 7; // Mon=0
  const daysInMonth = monthEnd.getDate();
  const monthLabel = monthStart.toLocaleDateString('en-GB', {month:'long', year:'numeric'});

  // Scope filter
  const visibleNames = new Set(
    _calScope === 'boarders'
      ? _calStudents.filter(s => _calBoarderStatus[s.name||s]).map(s => s.name||s)
      : _calStudents.map(s => s.name||s)
  );

  // Build day → leaves map
  const dayLeaves = {}; // 'YYYY-MM-DD' → [{student, type, confirmed}]
  _calLeaves.forEach(l => {
    if (!visibleNames.has(l.student_name)) return;
    const depPlanned = l.departure_planned ? l.departure_planned.split('T')[0] : null;
    const retPlanned = l.return_planned    ? l.return_planned.split('T')[0]    : null;
    const confirmed  = !!l.departed_at;
    if (!depPlanned) return;
    // Mark every day of the leave range
    const start = new Date(depPlanned + 'T00:00:00');
    const end   = retPlanned ? new Date(retPlanned + 'T00:00:00') : new Date(depPlanned + 'T00:00:00');
    const cur   = new Date(start);
    while (cur <= end) {
      const iso = cur.toISOString().split('T')[0];
      if (!dayLeaves[iso]) dayLeaves[iso] = [];
      dayLeaves[iso].push({ name: l.student_name, type: l.leave_type, confirmed, id: l.id });
      cur.setDate(cur.getDate() + 1);
    }
  });

  const typeColor = {
    weekend: '#3b82f6', medical: '#ef4444', family: '#8b5cf6',
    activity: '#10b981', holiday: '#f97316', longterm: '#6b7280'
  };

  // Calendar HTML
  let html = `
  <div style="padding:12px">
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button onclick="_calNav(-1,'${containerId}',_calSupaRef)" style="background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:16px;color:#374151">‹</button>
      <div style="text-align:center">
        <div style="font-size:15px;font-weight:700;color:#111">${monthLabel}</div>
      </div>
      <button onclick="_calNav(1,'${containerId}',_calSupaRef)" style="background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 12px;cursor:pointer;font-size:16px;color:#374151">›</button>
    </div>
    <!-- Scope toggle -->
    <div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center">
      <button onclick="_calSetScope('boarders','${containerId}')" style="font-size:12px;padding:4px 14px;border-radius:20px;border:none;background:${_calScope==='boarders'?'#00205B':'#f3f4f6'};color:${_calScope==='boarders'?'#fff':'#374151'};cursor:pointer;font-weight:${_calScope==='boarders'?'700':'400'}">Boarders</button>
      <button onclick="_calSetScope('all','${containerId}')" style="font-size:12px;padding:4px 14px;border-radius:20px;border:none;background:${_calScope==='all'?'#00205B':'#f3f4f6'};color:${_calScope==='all'?'#fff':'#374151'};cursor:pointer;font-weight:${_calScope==='all'?'700':'400'}">All House</button>
    </div>
    <!-- Day headers -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
      ${['M','T','W','T','F','S','S'].map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:#9ca3af;padding:4px 0">${d}</div>`).join('')}
    </div>
    <!-- Days grid -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">`;

  // Empty cells before month start
  for (let i = 0; i < firstDay; i++) {
    html += `<div style="min-height:52px"></div>`;
  }

  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${_calYear}-${String(_calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = iso === todayISO;
    const isPast  = iso < todayISO;
    const isSelected = iso === _calSelectedDay;
    const leaves  = dayLeaves[iso] || [];
    const count   = leaves.length;
    // Unique types for dot colours
    const types   = [...new Set(leaves.map(l => l.type))];
    const hasUnconfirmed = leaves.some(l => !l.confirmed);
    const hasConfirmed   = leaves.some(l => l.confirmed);

    html += `<div onclick="_calSelectDay('${iso}','${containerId}')" style="
      min-height:52px;border-radius:8px;padding:4px 2px;cursor:${count?'pointer':'default'};
      background:${isSelected?'#dbeafe':isToday?'#fef3c7':count?'#f8fafc':'transparent'};
      border:2px solid ${isSelected?'#3b82f6':isToday?'#f59e0b':count?'#e5e7eb':'transparent'};
      opacity:${isPast&&!count?'0.4':'1'};
      transition:all .15s">
      <div style="text-align:center;font-size:13px;font-weight:${isToday?'800':'500'};color:${isToday?'#d97706':isPast?'#9ca3af':'#111'};margin-bottom:3px">${d}</div>
      ${count ? `<div style="text-align:center;font-size:9px;font-weight:700;color:#6b7280;margin-bottom:3px">${count}</div>` : ''}
      <div style="display:flex;flex-wrap:wrap;gap:1px;justify-content:center">
        ${types.slice(0,4).map(t => {
          const col = typeColor[t] || '#9ca3af';
          return `<div style="width:7px;height:7px;border-radius:50%;background:${col};opacity:${hasUnconfirmed&&!hasConfirmed?'0.4':'1'};border:${hasUnconfirmed?'1px solid '+col:'none'}"></div>`;
        }).join('')}
      </div>
    </div>`;
  }

  html += `</div>`; // end grid

  // Selected day detail
  if (_calSelectedDay && dayLeaves[_calSelectedDay]) {
    const d = new Date(_calSelectedDay + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
    const dayLs = dayLeaves[_calSelectedDay];
    html += `<div style="margin-top:12px;background:#f8fafc;border-radius:10px;padding:12px;border:1px solid #e5e7eb">
      <div style="font-size:13px;font-weight:700;color:#374151;margin-bottom:8px">${dayLabel} — ${dayLs.length} away</div>
      ${dayLs.map(l => {
        const col = typeColor[l.type] || '#9ca3af';
        const status = l.confirmed ? '✓ Confirmed' : '⏳ Pending';
        const statusCol = l.confirmed ? '#16a34a' : '#d97706';
        return `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #e5e7eb">
          <div style="width:8px;height:8px;border-radius:50%;background:${col};flex-shrink:0"></div>
          <span style="flex:1;font-size:13px;font-weight:500;color:#111">${l.name}</span>
          <span style="font-size:10px;color:#6b7280">${l.type}</span>
          <span style="font-size:10px;color:${statusCol};font-weight:600">${status}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  html += `</div>`; // end padding div

  // Legend
  html += `<div style="padding:0 12px 12px;display:flex;flex-wrap:wrap;gap:6px">
    ${Object.entries(typeColor).map(([t,c])=>`<span style="font-size:10px;display:inline-flex;align-items:center;gap:3px;color:#6b7280">
      <span style="width:8px;height:8px;border-radius:50%;background:${c};display:inline-block"></span>${t}
    </span>`).join('')}
    <span style="font-size:10px;color:#9ca3af;margin-left:4px">· solid=confirmed · hollow=pending</span>
  </div>`;

  el.innerHTML = html;
}

let _calSupaRef = null;

function _calNav(dir, containerId) {
  _calMonth += dir;
  if (_calMonth < 0)  { _calMonth = 11; _calYear--; }
  if (_calMonth > 11) { _calMonth = 0;  _calYear++; }
  _calSelectedDay = null;
  loadCalendarLeaves(_calSupaRef).then(() => renderCalendar(containerId, _calSupaRef));
}

function _calSetScope(scope, containerId) {
  _calScope = scope;
  renderCalendar(containerId, _calSupaRef);
}

function _calSelectDay(iso, containerId) {
  _calSelectedDay = _calSelectedDay === iso ? null : iso;
  renderCalendar(containerId, _calSupaRef);
}

async function loadLiaisonStudents(){
  if(_liaisonStudents.length)return;
  try{
    const data=await(await supa('work_app_data')).get('key=eq.students');
    console.log('Student raw data:',data);
    if(data&&data[0]){
      let v=data[0].value;
      // May be double-stringified
      if(typeof v==='string'){try{v=JSON.parse(v);}catch{}}
      if(typeof v==='string'){try{v=JSON.parse(v);}catch{}}
      if(Array.isArray(v)){
        _liaisonStudents=v.map(s=>typeof s==='string'?s:(s.name||'')).filter(Boolean);
      } else if(typeof v==='object'&&v!==null){
        // Might be {students:[...]}
        const arr=v.students||v.data||Object.values(v);
        if(Array.isArray(arr))_liaisonStudents=arr.map(s=>typeof s==='string'?s:(s.name||'')).filter(Boolean);
      }
      console.log('Students loaded:',_liaisonStudents.length,_liaisonStudents.slice(0,3));
    }
  }catch(e){console.warn('Student load error:',e);}
}

async function saveEditLeave(id){
  const type=document.getElementById('el-type')?.value;
  const start=document.getElementById('el-start')?.value;
  const end=document.getElementById('el-end')?.value;
  const notes=document.getElementById('el-notes')?.value?.trim();
  if(!type||!start){alert('Type and start date required');return;}
  try{
    const {error}=await _supaClient.from('boarding_leaves').update({
      leave_type:type,
      departure_planned:start+'T00:00:00',
      return_planned:end?end+'T23:59:59':null,
      reason:notes||''
    }).eq('id',id);
    if(error)throw error;
    document.getElementById('edit-leave-modal')?.remove();
    showLiaisonToast('✓ Leave updated');
    loadLeaves();
  }catch(e){alert('Error: '+e.message);}
}

async function submitLeave(){
  const _lvInp=document.getElementById('lv-name');
  const name=(_lvInp?.getAttribute('data-selected')||_lvInp?.value||'').trim();
  const type=document.getElementById('lv-type')?.value;
  const start=document.getElementById('lv-start')?.value;
  const end=document.getElementById('lv-end')?.value;
  const notes=document.getElementById('lv-notes')?.value?.trim();
  if(!name||!type||!start){alert('Please fill in student name, type and start date.');return;}
  const btn=document.getElementById('lv-submit');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    const db=await supa('boarding_leaves');
    await db.patch ? null : null; // ensure client ready
    const res=await fetch(`${SUPA_URL}/rest/v1/boarding_leaves`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${SUPA_KEY}`,'apikey':SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(Object.assign(
        {
          student_name:name,
          leave_type:type,
          departure_planned:start+'T00:00:00',
          return_planned:end?end+'T23:59:59':null,
          reason:notes||'',
          active:true,
          created_by:'Liaison',
        },
        // Only include checklist fields if columns exist (graceful degradation)
        (() => {
          try {
            return {
              form_submitted:document.getElementById('lv-form')?.checked||false,
              parents_called:document.getElementById('lv-called')?.checked||false,
            };
          } catch(e) { return {}; }
        })()
      ))
    });
    if(!res.ok){
      // If 400, try without optional columns (may not exist yet)
      if(res.status===400){
        const body2=JSON.stringify({student_name:name,leave_type:type,
          departure_planned:start+'T00:00:00',return_planned:end?end+'T23:59:59':null,
          reason:notes||'',active:true,created_by:'Liaison'});
        const res2=await fetch(`${SUPA_URL}/rest/v1/boarding_leaves`,{
          method:'POST',
          headers:{'Authorization':`Bearer ${SUPA_KEY}`,'apikey':SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
          body:body2
        });
        if(!res2.ok)throw new Error('Save failed: '+res2.status);
      } else {
        throw new Error('Save failed: '+res.status);
      }
    }
    // Reset form fields without rebuilding the form
    const nameInp=document.getElementById('lv-name');
    if(nameInp){nameInp.value='';nameInp.removeAttribute('data-selected');}
    const typeInp=document.getElementById('lv-type');
    if(typeInp)typeInp.value='';
    const endInp=document.getElementById('lv-end');
    if(endInp)endInp.value='';
    const notesInp=document.getElementById('lv-notes');
    if(notesInp)notesInp.value='';
    const formChk=document.getElementById('lv-form');
    if(formChk)formChk.checked=false;
    const calledChk=document.getElementById('lv-called');
    if(calledChk)calledChk.checked=false;
    showLiaisonToast('✓ Leave request submitted');
    refreshLeavesList();
  }catch(e){alert('Error: '+e.message);}
  finally{btn.disabled=false;btn.textContent='Submit Request';}
}

}

async function loadRegister(){
  const el=document.getElementById('tab-register');
  el.innerHTML='<div class="loading">Loading register...</div>';
  const td=today();
  const data=await(await supa('boarding_registrations')).get(`register_date=eq.${td}&order=student_name`);

  const sessions={morning:[],prep:[],hoob:[]};
  const allNames=new Set();
  const byName={};
  data.forEach(r=>{
    allNames.add(r.student_name);
    if(!byName[r.student_name])byName[r.student_name]={};
    byName[r.student_name][r.session_type]={status:r.status,updated_at:r.updated_at};
  });

  const sessionLabel={morning:'🌅 Morning Clearance',prep:'📚 Evening Prep',hoob:'🌙 Heads on Beds'};
  let html='<div class="card"><div class="card-title" style="padding-bottom:8px">Today — '+new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})+'</div>';

  if(!allNames.size){html+='<div class="empty">No registrations today.</div></div>';el.innerHTML=html;return;}

  ['morning','prep','hoob'].forEach(sess=>{
    html+=`<div class="card-title" style="background:#f8fafc;padding:6px 14px;font-size:10px">${sessionLabel[sess]}</div>`;
    [...allNames].sort().forEach(name=>{
      const st=((byName[name]||{})[sess]||{}).status||'';
      const cls=st==='present'?'stat-p':st==='absent'?'stat-a':st==='excused'?'stat-e':st==='l'?'stat-l':'stat-blank';
      const sym=st==='present'?'✓':st==='absent'?'✗':st==='excused'?'~':st==='l'?'L':'·';
      const reg=byName[name]?.[sess];
      // Show last updated time (not staff name)
      const updTime=reg?.updated_at?new Date(reg.updated_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'';
      html+=`<div class="reg-item">
        <span class="reg-name">${name}</span>
        <span style="flex:1;font-size:10px;color:#bbb;text-align:right;padding-right:6px">${updTime}</span>
        <span class="reg-stat ${cls}">${sym}</span>
      </div>`;
    });
  });
  html+='</div>';
  el.innerHTML=html;
}

// ── MESSAGE GENERATOR ────────────────────────────────────────────
let _gmReason='parents';
let _gmText='';
let _liaisonStudents=[];

async function renderMessageTab(){
  // Load student list from Supabase if not yet loaded
  if(!_liaisonStudents.length){
    try{
      const db=await supa('work_app_data');
      const data=await db.get('key=eq.students');
      if(data&&data[0]){
        let v=data[0].value;
        try{v=JSON.parse(v);}catch{}
        if(Array.isArray(v))_liaisonStudents=v.map(s=>s.name||s);
      }
    }catch(e){}
  }
  const now=new Date();
  const dateVal=now.toISOString().split('T')[0];
  const timeVal=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const opts=_liaisonStudents.map(n=>`<option value="${n}">`).join('');
  const el=document.getElementById('tab-message');
  el.innerHTML=`<div class="card">
    <div class="card-title">📨 Gate Pass Message</div>
    <div style="display:flex;flex-direction:column;gap:10px;padding:8px 4px">
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">STUDENT</label>
        <div style="position:relative">
          <input id="lv-gm-student" placeholder="Type name…"
            autocomplete="off" autocorrect="off" spellcheck="false"
            oninput="lGmFilterStudents();updateLiaisonMsg()"
            onfocus="lGmFilterStudents()"
            onblur="setTimeout(()=>{const d=document.getElementById('lv-gm-drop');if(d)d.style.display='none';},200)"
            style="width:100%;padding:10px 12px;border-radius:7px;border:1px solid #e5e7eb;font-size:14px">
          <div id="lv-gm-drop" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e5e7eb;border-radius:7px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:999;margin-top:2px"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">DATE</label>
          <input id="lv-gm-date" type="date" value="${dateVal}" oninput="updateLiaisonMsg()"
            style="width:100%;padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
        </div>
        <div style="flex:1">
          <label style="font-size:10px;color:#888;display:block;margin-bottom:3px">TIME</label>
          <input id="lv-gm-time" type="time" value="${timeVal}" oninput="updateLiaisonMsg()"
            style="width:100%;padding:7px 8px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
        </div>
      </div>
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:5px">REASON</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px" id="lv-gm-reasons">
          ${[['parents','👨‍👩‍👧 Parents','家长接送'],['relative','👤 Relative','亲属接送'],['didi','🚗 Didi/Taxi','滴滴/出租车'],['activity','🏃 Activity','学校活动']].map(([v,l,s])=>`
            <button onclick="selectLiaisonReason('${v}')" id="lv-r-${v}"
              style="background:${v==='parents'?'#00205B':'#f8fafc'};border:1px solid ${v==='parents'?'#00205B':'#e5e7eb'};border-radius:8px;color:${v==='parents'?'#fff':'#333'};padding:8px 10px;cursor:pointer;text-align:left">
              <div style="font-size:13px;font-weight:600">${l}</div>
              <div style="font-size:10px;opacity:.7">${s}</div>
            </button>`).join('')}
        </div>
      </div>
      <div id="lv-gm-extra"></div>
      <div>
        <label style="font-size:10px;color:#888;display:block;margin-bottom:4px">MESSAGE PREVIEW</label>
        <div id="lv-gm-preview" style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;white-space:pre-wrap;min-height:90px;color:#333;word-break:break-word"></div>
      </div>
      <button onclick="copyLiaisonMsg()"
        style="background:#00205B;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer">
        📋 Copy Message
      </button>
    </div>
  </div>`;
  _gmReason='parents';
  updateLiaisonMsg();
}

function selectLiaisonReason(r){
  _gmReason=r;
  document.querySelectorAll('#lv-gm-reasons button').forEach(b=>{
    const on=b.id==='lv-r-'+r;
    b.style.background=on?'#00205B':'#f8fafc';
    b.style.borderColor=on?'#00205B':'#e5e7eb';
    b.style.color=on?'#fff':'#333';
  });
  // Extra fields
  const ex=document.getElementById('lv-gm-extra');
  if(r==='relative'){
    ex.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">
      <input id="lv-gm-rel" placeholder="Relative name (optional)" oninput="updateLiaisonMsg()"
        style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
      <input id="lv-gm-relid" placeholder="ID number (optional)" oninput="updateLiaisonMsg()"
        style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:13px">
    </div>`;
  } else if(r==='didi'){
    ex.innerHTML=`<input id="lv-gm-plate" placeholder="Plate number e.g. 苏EK1234 (optional)" oninput="updateLiaisonMsg()"
      style="width:100%;padding:7px 10px;border-radius:7px;border:1px solid #e5e7eb;font-size:14px;letter-spacing:2px">`;
  } else { ex.innerHTML=''; }
  updateLiaisonMsg();
}

function updateLiaisonMsg(){
  const name=(document.getElementById('lv-gm-student')?.value||'').trim();
  const date=document.getElementById('lv-gm-date')?.value||'';
  const time=document.getElementById('lv-gm-time')?.value||'';
  const r=_gmReason;
  let dateLabel=date,dateLabelZh=date;
  try{
    const d=new Date(date+'T12:00:00');
    const days=['周日','周一','周二','周三','周四','周五','周六'];
    const dEn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    dateLabel=dEn[d.getDay()]+' '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    dateLabelZh=days[d.getDay()]+' '+(d.getMonth()+1)+'月'+d.getDate()+'日';
  }catch(e){}
  const rzh={parents:'家长接送',relative:'亲属接送（需查验证件）',didi:'滴滴/出租车接送',activity:'学校活动外出'}[r]||'家长接送';
  const ren={parents:'Parents picking up',relative:'Relative pick-up (ID required)',didi:'Didi / Taxi pick-up',activity:'School activity'}[r]||'Parents picking up';
  const NL='\n';
  let exZh='',exEn='';
  if(r==='relative'){
    const rn=document.getElementById('lv-gm-rel')?.value?.trim()||'';
    const ri=document.getElementById('lv-gm-relid')?.value?.trim()||'';
    if(rn){exZh+=NL+'亲属姓名：'+rn;exEn+=NL+'Relative: '+rn;}
    if(ri){exZh+=NL+'证件号码：'+ri;exEn+=NL+'ID: '+ri;}
  } else if(r==='didi'){
    const pl=document.getElementById('lv-gm-plate')?.value?.trim()||'';
    if(pl){exZh+=NL+'车牌号：'+pl;exEn+=NL+'Plate: '+pl;}
  }
  const zh='【霍金宿舍 Hawking House】'+NL+dateLabelZh+' '+time+NL+NL+'学生：'+(name||'___')+NL+'离开原因：'+rzh+exZh+NL+NL+'请允许该学生出门，谢谢 ✅';
  const en='Hawking House | '+dateLabel+' '+time+NL+'Student: '+(name||'___')+NL+'Reason: '+ren+exEn+NL+'Please allow student through the gate ✅';
  _gmText=zh+NL+NL+en;
  const pr=document.getElementById('lv-gm-preview');
  if(pr)pr.textContent=_gmText;
}

async function copyLiaisonMsg(){
  if(!_gmText)return;
  try{
    await navigator.clipboard.writeText(_gmText);
    showLiaisonToast('✓ Copied to clipboard');
  }catch{
    const ta=document.createElement('textarea');
    ta.value=_gmText;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
    showLiaisonToast('✓ Copied');
  }
}

// ── MEDICAL ──────────────────────────────────────────────────────────────────
async function loadMedical(){
  const el=document.getElementById('tab-medical');
  el.innerHTML='<div class="loading">Loading...</div>';
  const from=new Date();from.setDate(from.getDate()-7);
  const fromISO=from.toISOString().split('T')[0];
  const data=await(await supa('boarding_medical')).get(`visit_date=gte.${fromISO}&order=visit_time.desc`);
  if(!data.length){el.innerHTML='<div class="empty">No nurse visits in the last 7 days.</div>';return;}
  let html='<div class="card"><div class="card-title">Nurse Visits — Last 7 Days</div>';
  data.forEach(v=>{
    const t=v.visit_time?new Date(v.visit_time).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
    html+=`<div class="card-row">
      <div style="flex:1">
        <div class="leave-name">${v.student_name}</div>
        <div class="leave-meta">${t}${v.session_type?' · '+v.session_type:''}</div>
        ${v.notes?`<div class="leave-meta" style="font-style:italic;color:#aaa">${v.notes}</div>`:''}
      </div>
      <div style="font-size:10px;color:#888">${v.logged_by||''}</div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}
</script>
<script>
if('serviceWorker' in navigator){
  // Unregister old SWs that may be caching broken versions
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>{
      r.active?.scriptURL && console.log('SW:',r.active.scriptURL);
    });
  });
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(r => {
        console.log('Liaison SW registered, scope:', r.scope);
        // Force update check
        r.update();
      })
      .catch(e => console.warn('SW failed:', e));
  });
  // If SW is controlling and might be serving stale content, check version
  if(navigator.serviceWorker.controller){
    console.log('SW controlling page');
  }
}
</script>
